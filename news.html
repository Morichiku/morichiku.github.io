<!DOCTYPE HTML>
<html>
<head>
    <title>News - Morichiku's Gallery</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css?v=2" />
</head>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const leaveCover = document.createElement('div');
    leaveCover.className = 'page-leave-cover';
    document.body.appendChild(leaveCover);

    const links = document.querySelectorAll('.global-nav a');
    
    links.forEach(link => {
        link.addEventListener('click', function(e) {
            if (this.href === window.location.href) return;
            e.preventDefault(); 
            const targetUrl = this.href;
            document.body.classList.add('is-leaving');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 500);
        });
    });
});

window.addEventListener('pageshow', function(e) {
    if (e.persisted) {
        document.body.classList.remove('is-leaving');
    }
});
</script>
<body class="page-news">
   <div class="page-transition-wrap">

        <div class="transition-right"></div>
        <div class="transition-message">

            </div>
        </div>
    </div>

    <header id="header">

    </header>

    <div id="main">
        <section id="one">
            <header class="major" style="text-align: center; margin-bottom: 3em;">
                <h2>News / お知らせ</h2>

            <ul class="alt">

    <site-footer id="site-footer">
